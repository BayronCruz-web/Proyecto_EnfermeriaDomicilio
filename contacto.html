<!doctype html>
<html lang="en">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <link rel="stylesheet" href="main.css">


    


    <!-- Bootstrap CSS v5.2.1 -->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />

    
</head>

<body>
    <header>
        <!-- place navbar here -->
    </header>
    <main>
        <section id="contacto" class="container py-5" onsubmit="return validarFormulario()">

            <h1 class="contact-title">Página de <strong>Contacto</strong></h1>

            <div class="row contact-box">

                <!-- INFO -->
                <div class="col-md-6 contact-info">

                    <h2>Contáctanos</h2>

                    <p>
                        Por favor, completa el siguiente formulario y estaremos
                        encantados de responderte lo antes posible. Nuestro
                        compromiso es ofrecer un cuidado profesional en todo momento.
                    </p>

                    <div class="contact-item">
                        <i class="bi bi-envelope-fill"></i>
                        <a href="mailto:infoenfermeriadomicilio.com">
                            info@bonsaienfermeria.com
                        </a>
                    </div>

                    <div class="contact-item">
                        <i class="bi bi-telephone-fill"></i>
                        <a href="tel:+50672276393">
                            (506) 7227-6393
                        </a>
                    </div>

                    <h4 class="mt-4">Redes Sociales</h4>

                    <div class="social-icons">
                        <i class="bi bi-facebook"></i>
                        <i class="bi bi-instagram"></i>
                        <i class="bi bi-whatsapp"></i>
                    </div>

                </div>


                <!-- FORM -->
                <div class="col-md-6">

                    <form id="contactForm">

                        <div class="mb-3">
                            <input type="text" class="form-control" id="nombre" placeholder="Nombre completo">
                        </div>

                        <div class="mb-3">
                            <input type="tel" class="form-control" id="telefono" placeholder="Teléfono">
                        </div>

                        <div class="mb-3">
                            <input type="email" class="form-control" id="email" placeholder="Correo electrónico">
                        </div>

                        <div class="mb-3">
                            <textarea class="form-control" id="mensaje" rows="4"
                                placeholder="Escribe tu mensaje"></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Enviar mensaje
                        </button>

                        <p id="formMessage" class="mt-3"></p>

                    </form>

                </div>

            </div>

        </section>
    </main>
    <footer>
        <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>

    <script src="script.js"></script>
</body>

</html>
